name: Deploy Flet Portfolio

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Flet
        run: |
          pip install flet
          flet --version
      
      - name: Build web app
        run: flet build web --base-url my-portfolio --route-url-strategy hash --yes
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
